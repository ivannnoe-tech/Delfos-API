---
name: Technical task
description: Registrar tarefa técnica, documentação, refatoração ou governança
title: "task: "
labels: ["task"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objetivo
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Arquivos ou áreas afetadas
  - type: textarea
    id: validation
    attributes:
      label: Validação esperada
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: A tarefa está alinhada ao `AGENTS.md`.
          required: true
        - label: A tarefa evita mudanças grandes demais em um único passo.
          required: true
