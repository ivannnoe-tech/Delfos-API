---
name: Feature request
description: Propor nova funcionalidade ou melhoria aprovada
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema ou oportunidade
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposta
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Escopo e fora de escopo
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Critérios de aceite
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Fase
      options: ["Fase 1", "Fase 2", "A definir"]
    validations:
      required: true
